# dclint disable no-unbound-port-interfaces
# nginx intentionally binds all interfaces; Apache on the host proxies to it
name: badapple2-prod
services:
  db:
    build:
      context: https://github.com/unmtransinfo/Badapple2.git#main
      dockerfile: Dockerfile
      args:
        - DB_PORT=${DB_PORT}
        - DB_NAME=${DB_NAME}
        - DB_USER=${DB_USER}
        - DB_PASSWORD=${DB_PASSWORD}
        - PGDUMP_URL=${DB_PGDUMP_URL}
        - TZ=${TZ}
    container_name: badapple_classic_db
    volumes:
      - badapple_classic_data:/var/lib/postgresql/14/main
    environment:
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_PORT=${DB_PORT}
      - PGDUMP_URL=${DB_PGDUMP_URL}
      - TZ=${TZ}
    env_file:
      - .env
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -d ${DB_NAME} -p ${DB_PORT}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  db2:
    build:
      context: https://github.com/unmtransinfo/Badapple2.git#main
      dockerfile: Dockerfile
      args:
        - DB_PORT=${DB2_PORT}
        - DB_NAME=${DB2_NAME}
        - DB_USER=${DB2_USER}
        - DB_PASSWORD=${DB2_PASSWORD}
        - PGDUMP_URL=${DB2_PGDUMP_URL}
        - TZ=${TZ}
    container_name: badapple2_db
    volumes:
      - badapple2_data:/var/lib/postgresql/14/main
    environment:
      - DB_NAME=${DB2_NAME}
      - DB_USER=${DB2_USER}
      - DB_PASSWORD=${DB2_PASSWORD}
      - DB_PORT=${DB2_PORT}
      - PGDUMP_URL=${DB2_PGDUMP_URL}
      - TZ=${TZ}
    env_file:
      - .env
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -d ${DB2_NAME} -p ${DB2_PORT}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./app
    depends_on:
      db:
        condition: service_healthy
      db2:
        condition: service_healthy
    volumes:
      - static_files_flasgger:/app/flasgger_static/
    environment:
      - APP_PORT=${APP_PORT}
      - DB_HOST=badapple_db # host is docker service
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_PORT=${DB_PORT}
      - DB2_HOST=badapple2_db
      - DB2_NAME=${DB2_NAME}
      - DB2_USER=${DB2_USER}
      - DB2_PASSWORD=${DB2_PASSWORD}
      - DB2_PORT=${DB2_PORT}
    env_file:
      - .env
    networks:
      - backend
      - frontend
    restart: unless-stopped

  ui:
    build:
      context: https://github.com/unmtransinfo/Badapple2-UI.git#main
    volumes:
      - static_files_badapple:/app/dist/
    environment:
      - NODE_OPTIONS=--openssl-legacy-provider
    env_file:
      - .env
    networks:
      - frontend
    command: npx vite build

  nginx:
    image: nginx:1
    depends_on:
      api:
        condition: service_started
      ui:
        condition: service_completed_successfully
    volumes:
      - static_files_badapple:/usr/share/nginx/html/static_files_badapple:ro
      - static_files_flasgger:/usr/share/nginx/html/static_files_flasgger:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx:/etc/nginx
    ports:
      - "${BADAPPLE_NGINX_HTTP_PORT:-80}:80"
      - "${BADAPPLE_NGINX_SSL_PORT:-443}:443"
    networks:
      - frontend
    restart: unless-stopped
networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge

volumes:
  badapple_classic_data:
  badapple2_data:
  static_files_badapple:
  static_files_flasgger:
  nginx:
